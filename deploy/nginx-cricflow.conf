# /etc/nginx/sites-available/cricflow
# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name cricflow.online www.cricflow.online;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://cricflow.online$request_uri;
    }
}

# HTTPS — main site
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name cricflow.online www.cricflow.online;

    ssl_certificate     /etc/letsencrypt/live/cricflow.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cricflow.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    # Proxy everything to Docker frontend container
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket upgrade passthrough
    location /ws/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }
}
